name: Docker Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-push
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'artshar' }}
  IMAGE_TAG: ${{ vars.DOCKER_IMAGE_TAG || '1.0.0' }}
  BACKEND_IMAGE_NAME: talkie-backend
  FRONTEND_IMAGE_NAME: talkie-frontend
  DOCKERHUB_LOGIN: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER }}
  DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PAT || secrets.DOCKERHUB_PASSWORD }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub Credentials
        run: |
          if [ -z "${DOCKERHUB_LOGIN}" ] || [ -z "${DOCKERHUB_PASS}" ]; then
            echo "Missing Docker Hub credentials."
            echo "Set one of:"
            echo "  - DOCKERHUB_USERNAME + DOCKERHUB_TOKEN"
            echo "  - DOCKERHUB_USER + DOCKERHUB_PAT"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_LOGIN }}
          password: ${{ env.DOCKERHUB_PASS }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_BASE_URL=https://call.moderium-ai.ru
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
